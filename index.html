<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>My Store • Play Style</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f1f5f9;
      font-family: 'Google Sans', 'Segoe UI', Roboto, system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }

    /* main phone-frame container */
    .app-shell {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 40px rgba(0,0,0,0.08);
      overflow: hidden;
      position: relative;
      border-radius: 0;
    }
    @media (min-width: 768px) {
      .app-shell {
        border-radius: 2rem;
        height: 90vh;
        margin: 2rem;
      }
    }

    /* scrollable main content */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem 5rem;
      -webkit-overflow-scrolling: touch;
    }

    /* header */
    .store-header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      z-index: 10;
      padding-bottom: 0.6rem;
      margin-bottom: 0.5rem;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .logo-text {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1a73e8, #0f9d58);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .search-wrapper {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 2.5rem;
      padding: 0.15rem 0.15rem 0.15rem 1.2rem;
      border: 1px solid #e2e8f0;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      transition: all 0.2s;
    }
    .search-wrapper:focus-within {
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
    }
    .search-wrapper svg {
      width: 20px;
      height: 20px;
      fill: #94a3b8;
      flex-shrink: 0;
      margin-right: 0.3rem;
    }
    .search-input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0.75rem 0.3rem;
      font-size: 0.95rem;
      outline: none;
      color: #0f172a;
    }
    .search-input::placeholder {
      color: #94a3b8;
      font-weight: 400;
    }
    .search-clear {
      background: none;
      border: none;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      display: none;
      color: #64748b;
      font-weight: bold;
      font-size: 1.2rem;
    }

    /* bottom navigation */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e9eef3;
      display: flex;
      justify-content: space-around;
      padding: 0.5rem 0.2rem 0.7rem;
      box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
      z-index: 20;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      background: none;
      border: none;
      font-size: 0.7rem;
      font-weight: 500;
      color: #64748b;
      cursor: pointer;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      transition: 0.2s;
      flex: 1;
    }
    .nav-item svg {
      width: 24px;
      height: 24px;
      fill: #64748b;
      transition: fill 0.2s;
    }
    .nav-item.active {
      color: #1a73e8;
      background: #e8f0fe;
    }
    .nav-item.active svg {
      fill: #1a73e8;
    }

    /* category pills */
    .category-scroll {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding: 0.6rem 0 0.9rem;
      margin-bottom: 0.3rem;
      scrollbar-width: thin;
    }
    .category-scroll::-webkit-scrollbar {
      height: 4px;
    }
    .category-pill {
      background: #f1f5f9;
      border: none;
      padding: 0.4rem 1.1rem;
      border-radius: 2rem;
      font-weight: 550;
      color: #334155;
      white-space: nowrap;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.8rem;
      border: 1px solid transparent;
    }
    .category-pill.active {
      background: #1a73e8;
      color: white;
      border-color: #1a73e8;
      box-shadow: 0 4px 10px rgba(26,115,232,0.25);
    }

    /* sections */
    .section-label {
      font-weight: 650;
      font-size: 1.1rem;
      margin: 0.8rem 0 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: #0f172a;
    }
    .section-label svg {
      width: 20px;
      height: 20px;
      fill: #f59e0b;
    }

    .featured-row {
      display: flex;
      gap: 0.8rem;
      overflow-x: auto;
      padding-bottom: 0.4rem;
    }
    .featured-card {
      flex: 0 0 145px;
      background: white;
      border-radius: 1.4rem;
      padding: 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 6px 16px rgba(0,0,0,0.03);
      border: 1px solid #edf2f9;
      cursor: pointer;
      transition: 0.2s;
    }
    .featured-card:active {
      transform: scale(0.97);
    }
    .featured-icon {
      width: 60px;
      height: 60px;
      border-radius: 1.1rem;
      background: #eef2ff;
      margin-bottom: 0.5rem;
      overflow: hidden;
    }
    .featured-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* apps grid */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
      gap: 0.9rem;
      margin-top: 0.3rem;
    }
    .app-card {
      background: white;
      border-radius: 1.2rem;
      padding: 0.8rem 0.4rem 0.7rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border: 1px solid #edf2f9;
      box-shadow: 0 3px 10px rgba(0,0,0,0.02);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .app-card:active {
      transform: scale(0.97);
    }
    .app-icon {
      width: 52px;
      height: 52px;
      border-radius: 1rem;
      background: #f1f5f9;
      margin-bottom: 0.4rem;
      overflow: hidden;
    }
    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .app-name {
      font-weight: 650;
      font-size: 0.85rem;
      color: #0f172a;
    }
    .app-desc {
      font-size: 0.65rem;
      color: #64748b;
      margin: 0.15rem 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .app-cat {
      background: #e8f0fe;
      color: #1a73e8;
      font-size: 0.6rem;
      padding: 0.1rem 0.6rem;
      border-radius: 1rem;
      font-weight: 500;
    }

    .empty-message {
      grid-column: 1/-1;
      text-align: center;
      padding: 2rem;
      color: #64748b;
      font-weight: 500;
      background: #f8fafc;
      border-radius: 1.5rem;
    }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="main-content" id="mainContent">
    <div class="store-header">
      <div class="brand">
        <span class="logo-text">✦ My Store</span>
        <span style="font-size:0.8rem; color:#475569;">Apps & Games</span>
      </div>
      <div class="search-wrapper">
        <!-- custom search SVG icon -->
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search apps, games..." autocomplete="off">
        <button class="search-clear" id="searchClear">✕</button>
      </div>
    </div>
    <div id="dynamicContent"></div>
  </div>

  <!-- bottom navigation with custom SVGs -->
  <div class="bottom-nav">
    <button class="nav-item active" data-tab="featured">
      <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
      Featured
    </button>
    <button class="nav-item" data-tab="apps">
      <svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg>
      Apps
    </button>
    <button class="nav-item" data-tab="games">
      <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
      Games
    </button>
  </div>
</div>

<script>
  (function() {
    const JSON_URL = 'apps.json';
    let allApps = [];
    let activeTab = 'featured';
    let activeCategory = 'all';
    let searchQuery = '';

    // DOM
    const dynamicContent = document.getElementById('dynamicContent');
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const navItems = document.querySelectorAll('.nav-item');

    // helpers
    const escapeHTML = (str) => String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    // filter visible apps (status != hide)
    function getVisibleApps() {
      return allApps.filter(app => !app.status || app.status.toLowerCase() !== 'hide');
    }

    // tokenize query and compute match score
    function computeScore(app, queryWords) {
      let score = 0;
      const name = (app.name || '').toLowerCase();
      const desc = (app.brief_des || '').toLowerCase();
      const keywords = (app.keywords || []).map(k => k.toLowerCase());
      for (let word of queryWords) {
        if (name.includes(word)) score += 3;
        else if (desc.includes(word)) score += 2;
        else if (keywords.some(kw => kw.includes(word))) score += 1;
      }
      return score;
    }

    function getFilteredAppsForTab() {
      const visible = getVisibleApps();
      let pool = [];
      if (activeTab === 'featured') {
        pool = visible;
      } else if (activeTab === 'apps') {
        pool = visible;
        if (activeCategory !== 'all') {
          pool = pool.filter(app => app.category === activeCategory);
        }
      } else if (activeTab === 'games') {
        pool = visible.filter(app => app.category === 'game');
      }

      // apply smart search
      if (searchQuery.trim() !== '') {
        const queryWords = searchQuery.trim().toLowerCase().split(/\s+/);
        const scored = pool.map(app => ({ app, score: computeScore(app, queryWords) }));
        const matching = scored.filter(item => item.score > 0);
        matching.sort((a, b) => b.score - a.score);
        pool = matching.map(item => item.app);
      }
      return pool;
    }

    function renderAppsGrid(apps) {
      if (apps.length === 0) {
        return '<div class="apps-grid"><div class="empty-message">🚫 No App Found</div></div>';
      }
      let html = '<div class="apps-grid">';
      apps.forEach(app => {
        html += `
        <div class="app-card" data-page="${escapeHTML(app.page || '')}" data-name="${escapeHTML(app.name)}">
          <div class="app-icon"><img src="${escapeHTML(app.icon || 'https://placehold.co/100x100/e2e8f0/94a3b8?text=App')}" alt="${escapeHTML(app.name)}" onerror="this.onerror=null;this.src='https://placehold.co/100x100/e2e8f0/94a3b8?text=App';"></div>
          <div class="app-name">${escapeHTML(app.name)}</div>
          <div class="app-desc">${escapeHTML(app.brief_des || '')}</div>
          <span class="app-cat">${escapeHTML(app.category)}</span>
        </div>`;
      });
      html += '</div>';
      return html;
    }

    function renderContent() {
      const filtered = getFilteredAppsForTab();
      let html = '';

      if (activeTab === 'featured') {
        const featured = getVisibleApps().slice(0, 5);
        if (featured.length) {
          html += '<div class="section-label"><svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg> Featured</div>';
          html += '<div class="featured-row">';
          featured.forEach(app => {
            html += `
            <div class="featured-card" data-page="${escapeHTML(app.page || '')}" data-name="${escapeHTML(app.name)}">
              <div class="featured-icon"><img src="${escapeHTML(app.icon || 'https://placehold.co/100x100/e2e8f0/94a3b8?text=App')}" alt="${escapeHTML(app.name)}" onerror="this.onerror=null;this.src='https://placehold.co/100x100/e2e8f0/94a3b8?text=App';"></div>
              <span style="font-weight:600; font-size:0.9rem;">${escapeHTML(app.name)}</span>
              <span style="font-size:0.7rem;color:#64748b;">${escapeHTML(app.category)}</span>
            </div>`;
          });
          html += '</div>';
        }
        html += '<div class="section-label"><svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg> All Apps</div>';
        html += renderAppsGrid(filtered);
      } else if (activeTab === 'apps') {
        const categories = ['all', ...new Set(getVisibleApps().map(a => a.category))];
        html += '<div class="category-scroll" id="categoryPills">';
        categories.forEach(cat => {
          html += `<button class="category-pill ${cat === activeCategory ? 'active' : ''}" data-category="${cat}">${cat === 'all' ? 'All' : cat.charAt(0).toUpperCase()+cat.slice(1)}</button>`;
        });
        html += '</div>';
        html += renderAppsGrid(filtered);
      } else if (activeTab === 'games') {
        html += '<div class="section-label"><svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg> Games</div>';
        html += renderAppsGrid(filtered);
      }

      dynamicContent.innerHTML = html;
      attachCardListeners();
      if (activeTab === 'apps') attachCategoryListeners();
    }

    function attachCardListeners() {
      document.querySelectorAll('.app-card, .featured-card').forEach(card => {
        card.addEventListener('click', function(e) {
          const page = this.dataset.page;
          const name = this.dataset.name;
          if (page && page !== '#' && page.trim() !== '') {
            window.location.href = page;
          } else {
            alert(`No page set for "${name}"`);
          }
        });
      });
    }

    function attachCategoryListeners() {
      document.querySelectorAll('#categoryPills .category-pill').forEach(pill => {
        pill.addEventListener('click', function() {
          activeCategory = this.dataset.category;
          renderContent();
        });
      });
    }

    function switchTab(tab) {
      if (tab === activeTab) return;
      activeTab = tab;
      if (tab === 'apps') activeCategory = 'all';
      navItems.forEach(item => {
        item.classList.toggle('active', item.dataset.tab === tab);
      });
      renderContent();
      document.querySelector('.main-content').scrollTo(0,0);
    }

    // live search handler
    function onSearchInput() {
      searchQuery = searchInput.value;
      searchClear.style.display = searchQuery ? 'block' : 'none';
      renderContent();
    }

    // load apps
    async function loadApps() {
      try {
        const res = await fetch(JSON_URL);
        const data = await res.json();
        if (data && Array.isArray(data.apps)) {
          allApps = data.apps.map(app => ({
            ...app,
            category: (app.category || 'uncategorized').toLowerCase(),
            keywords: app.keywords || [],
            status: app.status || 'show'
          }));
        }
      } catch (e) {
        console.warn('Could not load apps.json, using demo data.');
        allApps = [
          { id:"1",name:"Focus Flow",brief_des:"Pomodoro timer",icon:"https://placehold.co/100x100/1a73e8/white?text=FF",keywords:["focus","productivity"],page:"focus.html",category:"productivity",status:"show" },
          { id:"2",name:"Car Racing X",brief_des:"Fast car racing game",icon:"https://placehold.co/100x100/ea4335/white?text=CR",keywords:["car","racing","game"],page:"racing.html",category:"game",status:"show" },
          { id:"3",name:"Pixel Quest",brief_des:"Retro RPG",icon:"https://placehold.co/100x100/0f9d58/white?text=PQ",keywords:["game","rpg"],page:"pixel.html",category:"game",status:"show" },
        ];
      }
      renderContent();
    }

    // events
    searchInput.addEventListener('input', onSearchInput);
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      onSearchInput();
      searchInput.focus();
    });
    navItems.forEach(item => item.addEventListener('click', () => switchTab(item.dataset.tab)));

    window.addEventListener('DOMContentLoaded', loadApps);
  })();
</script>
</body>
  </html>
